name: Build W4DJ Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - codex/dual-sync-slots

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --bundles dmg
            artifact_name: W4DJ-RKB-macOS-DMG
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - platform: macos-15-intel
            args: --bundles dmg
            artifact_name: W4DJ-RKB-macOS-Intel-DMG
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            args: --bundles nsis
            artifact_name: W4DJ-RKB-Windows-EXE
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build frontend
        working-directory: app
        run: npm run build

      - name: Create sidecar directory
        shell: bash
        run: mkdir -p src-tauri/binaries

      - name: Download FFmpeg sidecars for macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          curl -fL -o src-tauri/binaries/ffmpeg-aarch64-apple-darwin https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-darwin-arm64
          curl -fL -o src-tauri/binaries/ffmpeg-x86_64-apple-darwin https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-darwin-x64
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-x86_64-apple-darwin

      - name: Download FFmpeg sidecar for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-win32-x64" -OutFile "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri package
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
